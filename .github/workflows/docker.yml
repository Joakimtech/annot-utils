name: Build Docker Image

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Simple Docker build test - no push to registry
  docker-build-test:
    runs-on: ubuntu-latest
    name: Test Docker build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: List files (debug)
      run: |
        ls -la
        echo "Checking if Dockerfile exists:"
        test -f Dockerfile && echo "✅ Dockerfile found" || echo "❌ Dockerfile missing"
        
    - name: Build Docker image
      run: |
        docker build -t annot-utils:test .
        
    - name: Test Docker image
      run: |
        docker run --rm annot-utils:test --help
        docker run --rm annot-utils:test --version
