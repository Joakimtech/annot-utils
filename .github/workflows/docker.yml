name: Build Docker Image

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  # Temporarily disabled - re-enable after fixing main tests
  workflow_dispatch:  # Keep manual trigger option

jobs:
  docker:
    # TEMPORARILY DISABLED - Uncomment below to re-enable
    # if: false  # This line disables the job
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
        
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to DockerHub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        platforms: ${{ matrix.platform }}
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/annot-utils:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/annot-utils:${{ github.ref_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
