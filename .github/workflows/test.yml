name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sundays

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Don't cancel all jobs if one fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        exclude:
          # Optional: Exclude some combinations that are known to be slow or problematic
          - os: windows-latest
            python-version: '3.8'
          - os: macos-latest
            python-version: '3.8'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Display system information
      run: |
        python --version
        pip --version
        echo "OS: ${{ runner.os }}"
        echo "Arch: $(uname -m 2>/dev/null || echo 'N/A')"
      shell: bash
      
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e .
        pip install pytest pytest-cov pytest-timeout pytest-xdist flake8 black mypy
      shell: bash
      
    - name: Lint with flake8
      run: |
        flake8 annot_utils/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 annot_utils/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      shell: bash
      continue-on-error: true  # Don't fail the build on linting errors initially
      
    - name: Check formatting with black
      run: |
        black --check annot_utils/ --diff
      shell: bash
      continue-on-error: true
      
    - name: Run tests with coverage
      timeout-minutes: 10
      run: |
        pytest tests/ \
          --cov=annot_utils \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term \
          --verbose \
          -n auto  # Run tests in parallel
      shell: bash
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: ${{ runner.os }},python-${{ matrix.python-version }}
        name: codecov-umbrella
        fail_ci_if_error: false
      continue-on-error: true
      
    - name: Test CLI entry point
      run: |
        annot-utils --help
        annot-utils --version
      shell: bash
      
    - name: Test conversion functionality
      run: |
        python examples/test_conversion.py
      shell: bash
      
    - name: Test validation functionality
      run: |
        python examples/test_validator.py
      shell: bash
      
    - name: Test agreement functionality
      run: |
        python examples/test_agreement.py
      shell: bash
      
    - name: Store test artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ runner.os }}-py${{ matrix.python-version }}
        path: |
          htmlcov/
          *.html
          *.json
          *.txt
        retention-days: 7

  test-package-installation:
    name: Test package installation on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Build package
      run: |
        pip install build
        python -m build
      shell: bash
      
    - name: Test installation from wheel
      run: |
        pip install dist/*.whl
        annot-utils --version
      shell: bash
      
    - name: Test installation from source
      run: |
        pip uninstall -y annot-utils
        pip install .
        annot-utils --version
      shell: bash

  compatibility-test:
    name: Compatibility test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dependency-version: [minimal, latest]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install minimal dependencies
      if: matrix.dependency-version == 'minimal'
      run: |
        pip install numpy==1.24.0 shapely==2.0.0 Pillow==10.0.0 click==8.1.0 scikit-learn==1.3.0
        pip install -e .
        
    - name: Install latest dependencies
      if: matrix.dependency-version == 'latest'
      run: |
        pip install numpy shapely Pillow click scikit-learn --upgrade
        pip install -e .
        
    - name: Run smoke tests
      run: |
        python -c "from annot_utils import AnnotationConverter, AnnotationValidator, AgreementCalculator; print('✓ Imports successful')"
        annot-utils --help
      shell: bash

  benchmark:
    name: Performance benchmark
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install -e .
        pip install pytest-benchmark
        
    - name: Run benchmarks
      run: |
        pytest tests/benchmark.py --benchmark-only --benchmark-json=benchmark.json
      continue-on-error: true
      
    - name: Store benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: benchmark.json
        retention-days: 30

  cross-platform-validation:
    name: Cross-platform validation
    runs-on: ubuntu-latest
    needs: [test, test-package-installation]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Generate validation report
      run: |
        mkdir -p cross-platform-test
        python examples/test_conversion.py
        python examples/test_validator.py
        python examples/test_agreement.py
      shell: bash
      
    - name: Upload validation report
      uses: actions/upload-artifact@v3
      with:
        name: cross-platform-validation
        path: cross-platform-test/
        retention-days: 14

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [test, test-package-installation, compatibility-test]
    if: failure() && github.event_name == 'push'
    
    steps:
    - name: Send GitHub Action trigger
      uses: actions/github-script@v6
      with:
        script: |
          const { repo, owner } = context.repo;
          const run_url = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
          console.log(`Tests failed! Check ${run_url}`);
          // Add custom notification logic here (Slack, email, etc.)
