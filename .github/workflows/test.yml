name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']  # Removed 3.8 and 3.12 for now

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Display system information
      run: |
        python --version
        pip --version
        echo "OS: ${{ runner.os }}"
      shell: bash
      
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e .
        pip install pytest pytest-cov pytest-timeout flake8 black
      shell: bash
      
    - name: Lint with flake8
      run: |
        flake8 annot_utils/ --count --select=E9,F63,F7,F82 --show-source --statistics
      shell: bash
      continue-on-error: true
      
    - name: Check formatting with black
      run: |
        black --check annot_utils/ --diff
      shell: bash
      continue-on-error: true
      
    - name: Run basic tests (skip benchmarks)
      run: |
        # Run only non-benchmark tests
        pytest tests/ -v --ignore=tests/benchmark.py
      shell: bash
      
    - name: Test CLI entry point
      run: |
        annot-utils --help
        annot-utils --version
      shell: bash
      
    - name: Test conversion functionality
      run: |
        python -c "from annot_utils import AnnotationConverter; print('Import successful')"
      shell: bash
      
    - name: Store test artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ runner.os }}-py${{ matrix.python-version }}
        path: |
          *.html
          *.json
          *.txt
        retention-days: 7

  # Temporarily disabled benchmark job
  # benchmark:
  #   name: Performance benchmark
  #   runs-on: ubuntu-latest
  #   needs: [test]
  #   if: false  # Disabled until fixed
  #   ...

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [test]
    if: failure() && github.event_name == 'push'
    
    steps:
    - name: Send notification
      run: |
        echo "⚠️ Tests failed! Check GitHub Actions for details."
