name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Simple test job - only Ubuntu, only one Python version
  basic-test:
    runs-on: ubuntu-latest
    name: Basic functionality test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: List files (debug)
      run: |
        ls -la
        echo "Current directory contents:"
        pwd
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy shapely Pillow click scikit-learn
        
    - name: Install package
      run: |
        pip install -e .
        
    - name: Test imports
      run: |
        python -c "
import sys
print(f'Python version: {sys.version}')
try:
    from annot_utils import __version__
    print(f'✅ annot-utils version: {__version__}')
except ImportError as e:
    print(f'❌ Import error: {e}')
    sys.exit(1)
"
        
    - name: Test CLI
      run: |
        annot-utils --help || echo "CLI not found, checking..."
        which annot-utils || echo "Not in PATH"
        python -c "from annot_utils.cli import main; print('✅ CLI module works')"
