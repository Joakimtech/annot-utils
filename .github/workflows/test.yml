name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Display Python version
      run: python --version
      
    - name: Install package and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy shapely Pillow click scikit-learn
        pip install -e .
        
    - name: Test CLI import
      run: |
        python -c "from annot_utils import __version__; print(f'Version: {__version__}')"
        
    - name: Verify CLI entry point
      run: |
        annot-utils --help
        annot-utils --version
        
    - name: Run basic functionality tests
      run: |
        python -c "
from annot_utils.converter import AnnotationConverter
from annot_utils.validator import AnnotationValidator
from annot_utils.agreement import AgreementCalculator
print('✅ All modules imported successfully')
"
        
    - name: Run example tests (if they exist)
      run: |
        if [ -f examples/test_conversion.py ]; then
          python examples/test_conversion.py
        else
          echo "No example tests found, skipping"
        fi
      shell: bash
